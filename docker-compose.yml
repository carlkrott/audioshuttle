# AudioShuttle — AI-agnostic DAW control via MCP
#
# Prerequisites:
# 1. Download model GGUF files and place in ./models/
#    - gemma-4-E4B-it-UD-Q4_K_XL.gguf (main model, ~12GB)
#    - gemma-4-e4b-mmproj-BF16.gguf (vision projection)
# 2. Have REAPER running on the host with OSC enabled (ports 8000/9000)
# 3. Run: docker compose up
#
# For GPU passthrough (AMD ROCm):
#   The e4b service is configured for AMD GPUs via /dev/kfd + /dev/dri
#   GPU target is set via AMDGPU_TARGETS in Dockerfile.e4b (default: gfx1030)
#   See Dockerfile.e4b for how to target other AMD GPU architectures
#
# For NVIDIA GPU passthrough:
#   Uncomment the deploy.resources section below and install nvidia-container-toolkit
#   See https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html

services:
  e4b:
    build:
      context: .
      dockerfile: Dockerfile.e4b
    network_mode: "host"
    volumes:
      - ./models:/models  # Mount GGUF files here
    devices:
      # AMD ROCm GPU passthrough
      - /dev/kfd:/dev/kfd
      # Only pass through the dGPU render node (renderD128 = RX 6950 XT)
      # The iGPU render node (renderD129) is excluded to avoid confusion
      - /dev/dri/renderD128:/dev/dri/renderD128
    group_add:
      - "983"   # host video group GID
      - "987"   # host render group GID
    environment:
      - MODEL_PATH=/models/gemma-4-E4B-it-UD-Q4_K_XL.gguf
      - MMPROJ_PATH=/models/gemma-4-e4b-mmproj-BF16.gguf
      - PORT=8102
      - CONTEXT_SIZE=81920
      - N_GPU_LAYERS=99       # Offload all layers to GPU
      - HOST=0.0.0.0
      # AMD GPU architecture override (Navi 21 / gfx1030 for RX 6950 XT)
      # Comment out if ROCm auto-detects correctly
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
      # HIP device visibility — only see the dGPU
      - HIP_VISIBLE_DEVICES=0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8102/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # For NVIDIA GPU passthrough, uncomment this block instead of the devices section above:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  audioshuttle:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: "host"
    pid: "host"
    privileged: true
    group_add:
      - "992"
    volumes:
      # Share /tmp with host so the watcher state file is accessible
      # The Reaper Lua watcher writes to /tmp/audioshuttle_daw_state.json
      - /tmp:/tmp
      - ./communication:/communication
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ~/.Xauthority:/home/audioshuttle/.Xauthority
      - /dev/input:/dev/input
      - /dev/snd:/dev/snd
      - /run/user/1000:/run/user/1000
    depends_on:
      e4b:
        condition: service_healthy
    command: audioshuttle --transport=standalone --host=0.0.0.0 --port=8765 --no-browser --no-tray --no-model
    environment:
      - AUDIOSHUTTLE_MODEL_API_URL=http://localhost:8102/v1/chat/completions
      - AUDIOSHUTTLE_REAPER_HOST=127.0.0.1
      - AUDIOSHUTTLE_REAPER_PORT=8000
      - AUDIOSHUTTLE_REAPER_FEEDBACK_PORT=9000
      - AUDIOSHUTTLE_HOST=0.0.0.0
      - AUDIOSHUTTLE_PORT=8765
      - DISPLAY=${DISPLAY:-:0}
      - XAUTHORITY=/home/audioshuttle/.Xauthority
      - WAYLAND_DISPLAY=$WAYLAND_DISPLAY
      - XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR
      - QT_QPA_PLATFORM=wayland
    env_file: .env
    stdin_open: true
    tty: true
